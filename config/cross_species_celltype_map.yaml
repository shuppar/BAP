# cross_species_celltype_map.yaml — mouse → human cell-type mapping for
# Phase 9 cross-species RRHO2 validation.
#
# Each human dataset uses its own cell-type taxonomy (Velmeshev's L2/3, Nagy's
# Ex1-Ex8, etc.). This file declares which human labels correspond to each
# mouse focal cell type. Phase 9 reads this and runs RRHO2 between mouse
# pseudobulk-DE for the canonical type and the union of human pseudobulk-DE
# for the listed human labels.
#
# Convention: the mouse names match `cell_type` values produced by
# 07_annotation.py (per-cluster majority voting over CellTypist labels).
# Human labels are filled in PER DATASET as you actually load each one — the
# stubs here use the names reported in the published papers / metadata.
#
# After downloading data, run scripts/preview_human_dataset.py <dir> (TBW) to
# print the unique cell-type labels in each dataset, then update this file.
#
# Caveats:
#   - 1:many is fine (one mouse type → many human subtypes pooled).
#   - leave a list empty (`[]`) to skip that cell type in that dataset.
#   - if a label spans BOTH excitatory and inhibitory in a dataset (rare),
#     put it under whichever the paper assigns it to.

# ----------------------------------------------------------------------------
# BRAIN — focal cell types from 07_annotation.py
# ----------------------------------------------------------------------------
brain:

  # ---- Excitatory neurons ----
  "Excitatory neurons":
    nagy_2020_GSE144136:
      # Nagy 2020 uses Ex1..Ex8 by laminar identity; pool them.
      # UNVERIFIED label list — confirm against the GSE144136 cell metadata.
      labels: [Ex1, Ex2, Ex3, Ex4, Ex5, Ex6, Ex7, Ex8]
    maitra_2023_GSE213982:
      # Maitra 2023 uses ExN<NUM>_L<LAYER> naming (e.g. ExN10_L46).
      # Filled by pattern after data lands; for now match anything starting "ExN".
      labels_pattern: "^ExN"
    velmeshev_2019_autism:
      # Velmeshev 2019 uses laminar labels.
      labels: ["L2/3", "L4", "L5/6", "L5/6-CC", "Neu-NRGN-I", "Neu-NRGN-II", "Neu-mat"]
    herring_2022_GSE168408:
      # Herring 2022 uses BICCN-style labels (L2-3_CUX2, L4_RORB, etc.).
      # Confirm against the Lister-lab portal labels after download.
      labels_pattern: "^L[2-6]"
    marsh_2022_GSE198373:
      labels: []   # placenta dataset — no neurons

  # ---- Inhibitory neurons ----
  "Inhibitory neurons":
    nagy_2020_GSE144136:
      labels: [Inh1, Inh2, Inh3, Inh4, Inh5, Inh6, Inh7, Inh8]
    maitra_2023_GSE213982:
      labels_pattern: "^InN"
    velmeshev_2019_autism:
      # Major interneuron classes — PV, SST, VIP, SV2C
      labels: ["IN-PV", "IN-SST", "IN-VIP", "IN-SV2C"]
    herring_2022_GSE168408:
      labels_pattern: "^(PV|SST|VIP|LAMP5|ID2|Pvalb|Sst|Vip)"
    marsh_2022_GSE198373:
      labels: []

  # ---- Microglia ----
  # The single highest-priority cell type per the validation doc:
  # Maitra 2023 Mic1 = 38% of female-MDD DEGs.
  "Microglia":
    nagy_2020_GSE144136:
      labels: ["Mix_5"]   # the microglia cluster in Nagy 2020 was labeled Mix_5 — confirm
    maitra_2023_GSE213982:
      labels: ["Mic1", "Mic2"]   # Mic1 = the major MDD-relevant cluster
    velmeshev_2019_autism:
      labels: ["Microglia"]
    herring_2022_GSE168408:
      labels: ["Microglia"]
    marsh_2022_GSE198373:
      labels: []

  # ---- Oligodendrocytes ----
  "Oligodendrocytes":
    nagy_2020_GSE144136:
      labels: ["Oli", "Oli1", "Oli2"]
    maitra_2023_GSE213982:
      labels_pattern: "^Oli"
    velmeshev_2019_autism:
      labels: ["Oligodendrocytes"]
    herring_2022_GSE168408:
      labels_pattern: "^(Oli|MOL|MFOL)"
    marsh_2022_GSE198373:
      labels: []

  # ---- OPC ----
  "OPC":
    nagy_2020_GSE144136:
      labels: ["OPC"]
    maitra_2023_GSE213982:
      labels: ["OPC"]
    velmeshev_2019_autism:
      labels: ["OPC"]
    herring_2022_GSE168408:
      labels_pattern: "^OPC"
    marsh_2022_GSE198373:
      labels: []

  # ---- Astrocytes ----
  "Astrocytes":
    nagy_2020_GSE144136:
      labels: ["Ast", "Ast1", "Ast2"]
    maitra_2023_GSE213982:
      labels_pattern: "^Ast"
    velmeshev_2019_autism:
      labels: ["AST-FB", "AST-PP"]   # fibrous + protoplasmic
    herring_2022_GSE168408:
      labels_pattern: "^(Ast|Astrocyte)"
    marsh_2022_GSE198373:
      labels: []


# ----------------------------------------------------------------------------
# PLACENTA — focal cell types
# ----------------------------------------------------------------------------
# Cross-species placenta mapping is harder per the validation doc (mouse and
# human trophoblast biology diverge; hemochorial structure similar but EVT
# subtypes, invasion depth, syncytialization differ). Expect lower transfer
# confidence than brain. Start broad; refine after seeing Marsh 2022 labels.
placenta:

  # Mouse "Trophoblast" maps to many human subtypes — CTB (cytotrophoblast),
  # EVT (extravillous), STB (syncytiotrophoblast). Pool for the first pass.
  "Trophoblast":
    marsh_2022_GSE198373:
      labels_pattern: "^(CTB|STB|EVT|VCT|SCT|trophoblast)"
    # Vento-Tormo 2018 + ECHO-PATHWAYS — fill after download / dbGaP approval.
    vento_tormo_2018: {labels: []}

  "EVT":
    marsh_2022_GSE198373:
      labels_pattern: "^EVT"

  "Decidual":
    marsh_2022_GSE198373:
      labels: []   # Marsh 2022 is fetal-side villus + chorion only
    vento_tormo_2018:
      labels_pattern: "^(dS|dP|dM|Decid)"   # decidual stromal/perivascular/macrophage

  "Endothelial":
    marsh_2022_GSE198373:
      labels: ["Endothelial", "fEndo"]
    vento_tormo_2018:
      labels: ["Endo (f)", "Endo (m)"]

  "Immune":
    marsh_2022_GSE198373:
      labels: ["Hofbauer", "Macrophage"]
    vento_tormo_2018:
      labels_pattern: "^(dNK|dM|Granulocytes|ILC|Tcells|Bcell|HB)"
