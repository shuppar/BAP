# config/celltype_go_keywords.yaml
#
# Per-cell-type GO term relevance keywords. Used by scripts/build_go_relevance.py
# to keyword-filter the ~9,000+ GO terms in refs/msigdb_mouse.tsv into a
# cell-type-specific subset that 08c_pathways_summary.py uses for selective
# labeling of M5 panels.
#
# Keys are RAW cell type names as they appear in the 8c output CSVs (the
# `celltype` column). Quotes required where the name has spaces, hyphens, etc.
#
# Matching is case-insensitive substring against the FULL gs_name
# (e.g. "GOBP_REGULATION_OF_INFLAMMATORY_RESPONSE"). Keyword "INFLAMMATORY"
# matches that term. Keyword "B_CELL" matches "GOBP_B_CELL_ACTIVATION".
#
# Edit freely. After editing, re-run:
#   uv run python scripts/build_go_relevance.py
# That regenerates config/celltype_go_relevance.yaml — the actual list of
# matched GO term names used at plot time.
#
# _shared block: keywords added to EVERY cell type in that tissue.

placenta:
  _shared:
    keywords:
      - PLACENTA
      - PLACENTAL
      - IMPLANTATION
      - EXTRAEMBRYONIC
      - HYPOXIA
      - EMBRYONIC_DEVELOPMENT

  "B cell":
    keywords:
      - B_CELL
      - BCR
      - B_LYMPHOCYTE
      - IMMUNOGLOBULIN
      - ANTIBODY
      - HUMORAL_IMMUNE
      - PLASMA_CELL
      - GERMINAL_CENTER
