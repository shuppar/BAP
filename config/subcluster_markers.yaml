# config/subcluster_markers.yaml
# ============================================================================
# Marker gene sets for Phase 7d subcluster annotation (07d_subcluster_annotate.py).
#
# Structure:
#   subcluster_markers:
#     <slug>:                  # slug = slugify(--celltype) from 07b
#       <CellTypeName>:
#         markers: [Gene1, Gene2, ...]   # mouse gene symbols (case-sensitive)
#         refs: "Author Year; ..."       # literature source(s)
#
# Scoring: sc.tl.score_genes on the LOGNORM layer; per integer subcluster the
# highest mean score wins (07d merge_tracks). Missing symbols are warned+skipped
# (non-fatal), so stale symbols don't crash — but a set needs >=2 present genes
# to be scored at all. Aim for ~6-12 specific markers; huge lists dilute signal.
#
# SLUGS BELOW MATCH THE ACTUAL 07b RUNS (do not rename without re-running 07b):
#   brain:    immune, opc_oligodendrocytes, astrocytes_ependymal
#   placenta: dsc, endothelium, myeloid, nk
#
# Contamination_* labels: every 07b run isolates non-target cells into their own
# subclusters (majority-vote spillover from Phase 7). These sets let 7d NAME those
# clusters as Contamination_<type>; 8b/8c --subcluster then exclude any
# subcluster_name starting with "Contamination" (and "unresolved"). The label sets
# below were derived from the actual 07b marker review (2026-06).
#
# NOTE: Cx3cr1 is NOT in the 10x Flex Mouse Transcriptome v2 panel and has been
# removed from microglia/macrophage sets (would silently drop). Symbols I'm not
# fully sure of are flagged # UNVERIFIED.
# ============================================================================


subcluster_markers:

  # ==========================================================================
  # BRAIN — immune  (07b: Immune)
  #   states found: homeostatic microglia, Apoe+/PAM (P1), BAM, IFN microglia
  #   contaminants: neuronal, cerebellar granule, oligodendrocyte, neuroblast
  #   refs: Keren-Shaul 2017 Cell; Hammond 2019 Immunity; Li 2019 Science;
  #         Mrdjen 2018 Immunity (BAM); Mathys 2019 Nature (IFN)
  # ==========================================================================
  immune:

    Homeostatic_Microglia:
      # only genes that genuinely DROP in activation (so activated substates don't
      # all score homeostatic). Dropped Hexb/Csf1r/Cst3/P2ry13-stay-high.
      markers: [P2ry12, Tmem119, Siglech, Selplg, Gpr34, Sall1]
      refs: "Bennett 2016 Nat Neurosci; Keren-Shaul 2017 Cell"

    PAM_ATM_Microglia:
      # Proliferative-region-/axon-tract-associated microglia (developmental, P1).
      # Tight set matching cluster-1 top markers — absent canonical-DAM genes
      # (Spp1/Igf1/Fabp5/Cd9) removed so they don't dilute the score_genes mean.
      markers: [Apoe, Ctsb, Ctsd, Abca1, Anxa3, Grn, Cd63, Lpl, Gpnmb]
      refs: "Hammond 2019 Immunity; Li 2019 Science (PAM/ATM)"

    BAM:
      # Border-associated / perivascular macrophages (non-microglial CNS myeloid)
      markers: [Mrc1, Pf4, F13a1, Ms4a7, Dab2, Lyve1, Cbr2, Stab1]
      refs: "Mrdjen 2018 Immunity; Van Hove 2019 Nat Neurosci"

    IFN_Microglia:
      # Interferon-responsive microglia. Trimmed to genes actually in cluster 3;
      # removed Ifit1/Ifit3/Isg15/Rsad2/Usp18 (absent → diluted the score).
      markers: [Irf7, Bst2, Xaf1, Parp14, Slfn8, Rnf213, Lgals3bp]
      refs: "Mathys 2019 Nature; Sala Frigerio 2019 Cell Stem Cell"

    Proliferating_Microglia:
      markers: [Mki67, Top2a, Pcna, Mcm2, Cenpu]   # Cenpu = ex-Mlf1ip
      refs: "Hammond 2019 Immunity; Li 2019 Science"

    Contamination_Neuronal:
      markers: [Snap25, Rbfox3, Meg3, Syt1, Gria2, Grin2b, Snhg11, Ptprn2]
      refs: "contaminant — pan-neuronal"

    Contamination_Cb_Granule:
      markers: [Gabra6, Cbln3, Cbln1, Grm4, Fat2]
      refs: "contaminant — cerebellar granule"

    Contamination_Oligo:
      markers: [Plp1, Mbp, Mog, Mag, Cldn11]
      refs: "contaminant — oligodendrocyte"

    Contamination_Neuroblast:
      markers: [Dcx, Igfbpl1, Tubb2b, Cd24a, Sox11]
      refs: "contaminant — neuroblast/immature neuron"

  # ==========================================================================
  # BRAIN — opc_oligodendrocytes  (07b: OPC/Oligodendrocytes)
  #   lineage found: OPC, cycling OPC, COP, NFOL, MFOL, MOL
  #   contaminant: cerebellar granule
  #   refs: Marques 2016 Science; Zeisel 2018 Cell
  # ==========================================================================
  opc_oligodendrocytes:

    OPC:
      markers: [Pdgfra, Cspg4, Olig2, Sox10, Lhfpl3, Ptprz1, Tnr, Cspg5, Matn4]
      refs: "Marques 2016 Science; Zeisel 2018 Cell"

    Cycling_OPC:
      markers: [Mki67, Top2a, Pcna, Msi2, Pdgfra]
      refs: "Marques 2016 Science (cycling OPC); Hammond 2019"

    COP:
      # Committed OL precursor — Gpr17 peak, post-mitotic
      markers: [Gpr17, Bmp4, Enpp6, Nkx2-2, Itpr2, Bcas1]
      refs: "Marques 2016 Science"

    NFOL:
      # Newly-formed OL — differentiating
      markers: [Bcas1, Fyn, Tcf7l2, Frmd4a, Enpp6, Cd82, Sirt2]
      refs: "Marques 2016 Science"

    MFOL:
      # Myelin-forming OL — active myelination
      markers: [Mobp, Mbp, Plp1, Mal, Cnp, Tspan2]
      refs: "Marques 2016 Science; Nave 2014 Annu Rev Neurosci"

    MOL:
      # Mature OL — maintenance
      markers: [Mog, Mag, Klk6, Ptgds, Apod, Aplp1, Cldn11, Anxa5]
      refs: "Marques 2016 Science (MOL1-6)"

    Contamination_Cb_Granule:
      markers: [Gabra6, Cbln3, Cbln1, Grm4, Fat2]
      refs: "contaminant — cerebellar granule"

  # ==========================================================================
  # BRAIN — astrocytes_ependymal  (07b: Astrocytes/Ependymal, res 0.3)
  #   states found: mature/protoplasmic astro, immature/gliogenic astro,
  #     radial glia, ependymal (3 clusters), choroid plexus
  #   contaminants: cerebellar granule, neuroblast
  #   refs: Zeisel 2018 Cell; Bayraktar 2020 Nat Neurosci; Liddelow 2017 Nature;
  #         Lein 2007 / Allen (ependymal, choroid)
  # ==========================================================================
  astrocytes_ependymal:

    Protoplasmic_Astrocyte:
      # Grey-matter mature astrocyte
      markers: [Aqp4, Slc1a2, Slc1a3, Gpr37l1, Gjb6, Sox9, Fgfr3, Ntsr2, Sparcl1, Atp1a2]
      refs: "Zeisel 2018 Cell; Bayraktar 2020 Nat Neurosci"

    Fibrous_Astrocyte:
      # White-matter astrocyte
      markers: [Gfap, S100b, Kcnj10, Id3, Aqp4]
      refs: "Bayraktar 2020 Nat Neurosci"

    Immature_Astrocyte:
      # Developmental / gliogenic astrocyte (P1)
      markers: [Slco1c1, Foxg1, Sfrp1, Zbtb20, Lifr, Phyhipl, Cdh2]
      refs: "Zeisel 2018 Cell; Di Bella 2021 Nature"

    Radial_Glia:
      # Progenitor state (P1 only)
      markers: [Fabp7, Tnc, Ncan, Bcan, Vim, Nes, Hes1, Hes5, Pax6, Sox2]
      refs: "Di Bella 2021 Nature"

    Ependymal:
      # Multiciliated ependyma
      markers: [Foxj1, Cfap54, Cfap44, Cfap65, Cfap69, Ccdc39, Daw1, Ttll3, Pifo, Hydin, Tmem212]
      refs: "Shah 2018 Neuron; Zeisel 2018 Cell"
      # Pifo/Tmem212/Daw1/Ttll3/Hydin: motile-cilia genes # UNVERIFIED exact MGI for a couple

    Choroid_Plexus:
      markers: [Ttr, Folr1, Otx2, Kcnj13, Clic6, Aqp1, Prlr]   # Ttr/Folr1 canonical CP
      refs: "Lun 2015 Nat Rev Neurosci; Dani 2021 Cell"

    Reactive_A1:
      markers: [C3, Lcn2, Steap4, Serping1, Gbp2]   # H2-T23 dropped (UNVERIFIED symbol)
      refs: "Liddelow 2017 Nature; Zamanian 2012 J Neurosci"

    Reactive_A2:
      markers: [Emp1, Tgm1, Ptx3, S100a10, Cd109]
      refs: "Zamanian 2012 J Neurosci"

    Contamination_Cb_Granule:
      markers: [Gabra6, Cbln1, Cbln3, Grm4, Fat2]
      refs: "contaminant — cerebellar granule"

    Contamination_Neuroblast:
      markers: [Dcx, Igfbpl1, Tfap2a, Rbfox2, Sox11, Unc5c]
      refs: "contaminant — neuroblast/immature neuron"

  # ==========================================================================
  # PLACENTA — dsc  (07b: DSC)
  #   states found: decidual stroma, stromal fibroblast, smooth muscle
  #   contaminant: spongiotrophoblast (LARGE, E18.5-specific — cluster 4)
  #   refs: Liu 2023 Nat Commun; Pijuan-Sala 2023 Nat Ecol Evol; Marsh 2020 eLife
  # ==========================================================================
  dsc:

    Decidual_Stroma:
      markers: [Prl8a2, Pgr, Hand2, Hoxa11, Esr1, Wnt4, Bmp2, Dcn, Cxcl14]
      refs: "Liu 2023 Nat Commun; Pijuan-Sala 2023 Nat Ecol Evol"

    Stromal_Fibroblast:
      markers: [Col1a1, Col3a1, Col14a1, Mmp14, Aebp1, Lum, Sfrp4]
      refs: "Pijuan-Sala 2023 Nat Ecol Evol; Marsh 2020 eLife"

    Smooth_Muscle:
      # Uterine/perivascular SMC + myofibroblast
      markers: [Myh11, Tagln, Acta2, Actg2, Mylk, Tpm2, Myl9]
      refs: "Marsh 2020 eLife; Liu 2023 Nat Commun"

    Contamination_Trophoblast:
      # Spongiotrophoblast / junctional-zone trophoblast bleeding into DSC label
      markers: [Tpbpa, Tpbpb, Psg21, Ceacam11, Ceacam12, Prl8a6, Prl3b1, Ascl2]
      refs: "contaminant — junctional-zone trophoblast"

  # ==========================================================================
  # PLACENTA — endothelium  (07b: Endothelium)
  #   states found: fetal/maternal endothelium, lymphatic EC
  #   contaminants: erythroid, immune/leukocyte
  #   refs: Marsh 2020 eLife; Zhou 2021 Dev Cell
  # ==========================================================================
  endothelium:

    Fetal_Endothelium:
      # tightened to the strongest pan-endothelial genes so contaminant clusters
      # (erythroid/leukocyte embedded in EC) don't get out-scored by a broad set.
      markers: [Pecam1, Cdh5, Kdr, Egfl7, Plvap]
      refs: "Marsh 2020 eLife; Zhou 2021 Dev Cell"

    Proliferating_Endothelium:
      # cycling EC (Mki67+) — separates the proliferating cluster from a possible
      # erythroid call when Hb is only ambient.
      markers: [Mki67, Top2a, Pecam1, Cdh5, Kdr]
      refs: "proliferating endothelium"

    Lymphatic_Endothelium:
      markers: [Flt4, Prox1, Lyve1, Pdpn]
      refs: "Marsh 2020 eLife"

    Contamination_Erythroid:
      markers: [Hbb-y, Hba-x, Alas2]   # trimmed — Gypa/Klf1/Slc4a1/Ermap diluted
      refs: "contaminant — erythroid"

    Contamination_Immune:
      markers: [Ptprc, Ctss, Itgb2, Csf2ra, Cd52]
      refs: "contaminant — leukocyte"

  # ==========================================================================
  # PLACENTA — myeloid  (07b: Myeloid)
  #   states found: Hofbauer, monocyte, macrophage, dendritic cell, proliferating
  #   contaminants: erythroid, mesothelial (Wt1+), endothelial
  #   refs: Freyer 2022 Development; Chen 2022 Dev Cell
  # ==========================================================================
  myeloid:

    Hofbauer_cell:
      # Fetal tissue-resident macrophage (M2-like)
      markers: [Mrc1, Stab1, Fcrls, Maf, Cd68, Csf1r, Apoe, Lyve1, Folr2]   # Folr2 # UNVERIFIED mouse
      refs: "Freyer 2022 Development; Chen 2022 Dev Cell"

    Monocyte:
      markers: [Ly6c2, Ccr2, Plac8, Itgal, Adgre4, Fgr, S100a8, S100a9]
      refs: "Freyer 2022 Development"

    Macrophage:
      markers: [Adgre1, Cd68, Lgals3, Lilrb4a, Cd84, Siglec1, Ms4a7, Csf1r]
      refs: "Freyer 2022 Development; Chen 2022 Dev Cell"

    Dendritic_Cell:
      markers: [Cd74, H2-Ab1, H2-Aa, H2-Eb1, Ciita, Clec9a, Flt3, Xcr1]
      refs: "Guilliams 2016 Immunity"

    Proliferating_Myeloid:
      markers: [Mki67, Top2a, Kif11, Cdca2, Neil3]
      refs: "proliferating myeloid"

    Contamination_Erythroid:
      markers: [Hbb-y, Hba-x, Alas2, Ermap, Slc4a1, Kel]
      refs: "contaminant — erythroid"

    Contamination_Mesothelial:
      markers: [Wt1, Cyp11a1, Upk3b, Krt19, Lrrn4]   # Lrrn4/Upk3b mesothelial # UNVERIFIED
      refs: "contaminant — mesothelial/steroidogenic"

    Contamination_Endothelial:
      markers: [Egfl7, Pecam1, Cdh5, Adcy6, Npr1]
      refs: "contaminant — endothelial"

  # ==========================================================================
  # PLACENTA — nk  (07b: NK)
  #   states found: decidual NK (Spp1+/Fcrl6+), hypoxic NK
  #   contaminants: trophoblast, endothelial, erythroid
  #   refs: Vento-Tormo 2018 Nature; Gaynor 2020 J Immunol
  # ==========================================================================
  nk:

    Decidual_NK:
      markers: [Ncr1, Klrb1c, Klrd1, Nkg7, Gzmb, Prf1, Eomes, Spp1, Fcrl6]
      refs: "Vento-Tormo 2018 Nature; Gaynor 2020 J Immunol"

    Contamination_Trophoblast:
      markers: [Tpbpa, Prl3b1, Psg21, Ceacam11, Prl8a6, Ceacam12]
      refs: "contaminant — trophoblast"

    Contamination_Endothelial:
      markers: [Egfl7, Eng, Cdh5, Col4a1, Pecam1]
      refs: "contaminant — endothelial"

    Contamination_Erythroid:
      markers: [Hbb-y, Hba-x, Ermap, Slc4a1, Alas2]
      refs: "contaminant — erythroid"
