qc:
  pct_mt_max: 1.0
  pct_hemo_max: 5.0
  n_mads: 5
  min_counts: 500
  min_genes: 200
sex_markers:
  y_linked:
  - Ddx3y
  - Uty
  - Eif2s3y
  - Kdm5d
  x_linked:
  - Xist
composition:
  min_donors: 3
pathways:
  geneset_tsv: refs/msigdb_mouse.tsv
  collections:
  - MH
  - M2
  - M5
  - M8
  min_genes_per_set: 5
  use_builtin_stress_sets: false
  run_tf_activity: false
integration:
  n_hvg: 3000
  batch_key: pool
scvi:
  n_latent: 30
  n_layers: 2
  max_epochs: 400
  batch_size: 1024
  early_stopping_patience: 30
  condition_cell_cycle: false
clustering:
  n_neighbors: 30
  min_dist: 0.3
  spread: 1.2
random_seed: 42
annotation:
  celltypist_models:
    P1:
      class: Developing_Mouse_Brain.pkl
      subclass: null
      region: null
    4W:
      class: refs/celltypist_brain_adult_class.pkl
      subclass: refs/celltypist_brain_adult_subclass.pkl
      region: refs/celltypist_brain_adult_region.pkl
    3mo:
      class: refs/celltypist_brain_adult_class.pkl
      subclass: refs/celltypist_brain_adult_subclass.pkl
      region: refs/celltypist_brain_adult_region.pkl
  class_to_broad_csv: refs/abc_class_to_broad.csv
  subclass_to_region_csv: refs/abc_subclass_to_region.csv
reference:
  ref_h5ad: refs/abc_brain_ref.h5ad
  labels_key: cell_type
  region_key: region
  region_concentration_threshold: 0.8
contrasts:
  early_vs_relaxed_per_age:
    description: "Early Stress vs Relaxed, within each age \u2014 primary"
    design: ~ sex + pool + group
    group_by: age
    test: group
    levels:
    - Early_Stress
    - Relaxed
    flag: primary
  late_vs_relaxed_per_age:
    description: "Late Stress vs Relaxed, within each age \u2014 primary (P1 pool-confounded)"
    design: ~ sex + pool + group
    group_by: age
    test: group
    levels:
    - Late_Stress
    - Relaxed
    flag: primary
    confound_warnings:
      P1: "Late Stress at P1 is Pool3 only; Relaxed at P1 is Pool2 \u2014 pool vs group fully confounded."
  omnibus_3group_per_age:
    description: 'F-test: do the three groups differ at each age?'
    design: ~ sex + pool + group
    group_by: age
    test: group_omnibus
    flag: primary
  early_vs_late_per_age:
    description: "Early vs Late Stress \u2014 secondary, do the two timings differ?"
    design: ~ sex + pool + group
    group_by: age
    test: group
    levels:
    - Early_Stress
    - Late_Stress
    flag: secondary
  within_group_across_age:
    description: "Developmental trajectory within each group \u2014 pool-confounded with age"
    design: ~ sex + age
    group_by: group
    test: age
    pairwise:
    - - P1
      - 4W
    - - 4W
      - 3mo
    - - P1
      - 3mo
    flag: confounded_with_pool
  within_age_sex_stratified:
    description: "Stress contrasts within each sex \xD7 age \u2014 exploratory (n=2)"
    design: ~ pool + group
    group_by:
    - age
    - sex
    test: group
    levels:
    - Early_Stress
    - Relaxed
    flag: underpowered_exploratory
  group_x_age_interaction:
    description: Does the stress effect change with age?
    design: ~ sex + pool + group * age
    test: group:age
    flag: underpowered_exploratory
  persistence_early:
    description: Persistent/early-only/emergent/transient of Early-vs-Relaxed DEGs
    source_contrast: early_vs_relaxed_per_age
    ages_required:
    - P1
    - 4W
    - 3mo
    flag: derived
  persistence_late:
    description: Same for Late-vs-Relaxed DEGs (P1 carries confound flag)
    source_contrast: late_vs_relaxed_per_age
    ages_required:
    - P1
    - 4W
    - 3mo
    flag: derived
stress_focused_cell_types:
- microglia
- oligodendrocyte_lineage
- excitatory_neurons
- inhibitory_neurons
- astrocytes
