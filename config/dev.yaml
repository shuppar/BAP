# config/dev.yaml — overrides brain.yaml for laptop testing
#
# Use this instead of brain.yaml on the Mac:
#   uv run python scripts/01_validate.py --config config/dev.yaml
#
# What it does:
#   - Picks 3 brain samples (one per group, same age, all male)
#   - Downsamples each to 500 cells
#   - Writes results to results/dev/ (so it doesn't pollute results/brain/)

tissue: brain
profile: dev
results_dir: results/dev
group_reference: Relaxed

# Subset: only these 3 samples, 500 cells each.
# The validate script reads the full brain.yaml but filters to these IDs.
subset:
  enabled: true
  sample_ids: [E1-4WkM1, L1-4WkM1, S1-4WkM1]   # one per group
  max_cells_per_sample: 500
  random_seed: 42

# Sex markers (same as full config — duplicated for self-containedness)
sex_markers:
  y_linked: [Ddx3y, Uty, Eif2s3y, Kdm5d]
  x_linked: [Xist]

# QC thresholds (same as full config)
qc:
  pct_mt_max: 1.0
  pct_hemo_max: 5.0
  n_mads: 5
  min_counts: 500       # hard UMI floor
  min_genes: 200        # hard gene floor

random_seed: 42

# Point at the full sample manifest — the script reads samples from brain.yaml,
# then filters to subset.sample_ids
samples_from: config/brain.yaml

# CellTypist annotation models (per age).
# VERIFIED against CellTypist v1.7.1 model registry (12 built-in models):
#   - Developing_Mouse_Brain.pkl is the ONLY built-in mouse brain model.
#   - There is NO built-in adult mouse brain model in CellTypist.
# For 4W/3mo (adult) brain, options are:
#   (a) use Developing_Mouse_Brain as a rough first pass (labels approximate), or
#   (b) train a custom CellTypist model on the Allen Brain Cell Atlas (Yao 2023)
#       and point at the local .pkl, or
#   (c) skip CellTypist for adult ages and rely on marker-based annotation.
# Ages with no entry below fall back to marker-based provisional labels.
# Models download automatically on first use.
annotation:
  celltypist_models:
    P1: Developing_Mouse_Brain.pkl
    # 4W:  <custom Allen BCA model path>.pkl   # no built-in adult model
    # 3mo: <custom Allen BCA model path>.pkl
